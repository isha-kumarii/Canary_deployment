apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: eshop-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: eshop
  namespaceSelector:
    matchNames:
    - default
  endpoints:
  - port: web
    path: /metrics
    interval: 15s